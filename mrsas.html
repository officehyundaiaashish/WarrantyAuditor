<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRS Assigner — Audit-it</title>
    <style>
        /* ── CSS Variables ── */
        :root {
            /* Light Theme */
            --bg-base: #f4f7f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2ab5a5;
            --primary-hover: #1e9587;
            --primary-text: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --accent: #4dcfc3;
            --radius: 16px;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
            color-scheme: light;

            /* --- SHIMMER VISIBILITY (LIGHT THEME) --- */
            --notif-shimmer-bg: linear-gradient(90deg, transparent 20%, rgba(255, 255, 255, 0.4) 50%, transparent 80%);
            --notif-shimmer-crit-bg: linear-gradient(90deg, transparent 20%, rgba(255, 255, 255, 0.6) 50%, transparent 80%);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-base: #111827;
            --surface: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --primary: #2ab5a5;
            --primary-hover: #4dcfc3;
            --primary-text: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --accent: #4dcfc3;
            --shadow: 0 10px 40px -5px rgba(0, 0, 0, 0.7);
            --modal-overlay: rgba(0, 0, 0, 0.7);
            color-scheme: dark;

            /* --- SHIMMER VISIBILITY (DARK THEME) --- */
            --notif-shimmer-bg: linear-gradient(90deg, transparent 20%, rgba(255, 255, 255, 0.04) 50%, transparent 80%);
            --notif-shimmer-crit-bg: linear-gradient(90deg, transparent 20%, rgba(255, 255, 255, 0.055) 50%, transparent 80%);
        }

        /* ── Reset & Base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
        }

        /* --- MODERN PREMIUM SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 20px;
            border: 2.5px solid var(--bg-base);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-hover);
        }

        /* ── Header ── */
        .page-header {
            padding: 20px 32px;
            background: rgba(var(--surface-rgb), 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 2px 8px -2px rgba(0, 0, 0, 0.05);
        }

        .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-4px);
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.08);
        }

        /* ── main-animation ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Main Layout ── */
        .content-wrap {
            flex: 1;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 1700px;
            margin: 0 auto;
            width: 100%;
            animation: fadeInUp 0.5s ease-out backwards;
            animation-delay: 0.1s;
        }

        /* ── Table Section (Header Reference) ── */
        .table-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 160px);
            position: relative;
        }

        /* --- SHIMMER ANIMATION --- */
        @keyframes shimmerLeft {
            0% {
                background-position: -600px 0;
            }

            100% {
                background-position: 600px 0;
            }
        }

        .table-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--notif-shimmer-bg);
            background-size: 600px 100%;
            animation: shimmerLeft 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to right, rgba(42, 181, 165, 0.04), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .table-container {
            overflow: auto;
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1800px;
            /* Force scroll for many columns */
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--surface);
        }

        th {
            text-align: left;
            padding: 14px 18px;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        td {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            transition: background 0.2s;
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(16, 185, 129, 0.04);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--bg-base);
            border: 1px solid var(--border);
        }

        .badge-mrs {
            color: var(--accent);
            border-color: rgba(59, 130, 246, 0.2);
            background: rgba(59, 130, 246, 0.05);
        }

        .badge-ro {
            color: var(--primary);
            border-color: rgba(16, 185, 129, 0.2);
            background: rgba(16, 185, 129, 0.05);
        }

        .badge-cancel {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.05);
        }

        /* ── Search/Filter bar ── */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            position: relative;
            width: 280px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-base);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .search-box svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 2;
        }

        /* ── Action Buttons ── */
        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-feed {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px -2px rgba(42, 181, 165, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-feed:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -2px rgba(42, 181, 165, 0.4);
            filter: brightness(1.05);
        }

        .btn-feed:active {
            transform: scale(0.98);
        }

        .btn-feed.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .upload-tile {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-tile:hover {
            border-color: var(--primary);
            background: rgba(42, 181, 165, 0.02);
        }

        .upload-tile.active {
            border-style: solid;
            border-color: var(--primary);
            background: rgba(42, 181, 165, 0.05);
        }

        .upload-tile svg {
            width: 28px;
            height: 28px;
            stroke: var(--text-muted);
            margin-bottom: 8px;
            transition: stroke 0.2s;
        }

        .upload-tile:hover svg {
            stroke: var(--primary);
        }

        .upload-tile span {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .upload-tile p {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .upload-tile input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* ── Empty State ── */
        .empty-state {
            padding: 60px;
            text-align: center;
            color: var(--text-muted);
        }

        /* ── Footer ── */
        .page-footer {
            padding: 16px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.7;
        }
    </style>
</head>

            "part", "Sublet", "IGST", "AMT RECEIVED", "DIFF AMT",
            "Invoice No", "PAYMENT DATE", "AUTH. SIGN", "REMARKS"
        ];

        let source1Data = null;
        let source2Data = null;

        function handleFileSelect(type) {
            const input = document.getElementById(`file-${type}`);
            const status = document.getElementById(`status-${type}`);
            const tile = document.getElementById(`tile-${type}`);
            
            if (input.files.length > 0) {
                const file = input.files[0];
                status.innerText = file.name;
                status.style.color = 'var(--primary)';
                tile.classList.add('active');
                
                // Logic to read Excel data would go here (using XLSX library)
                console.log(`Selected ${type}: ${file.name}`);
            }
        }

        async function feedToTable() {
            // Placeholder for data mapping logic
            alert("Ready to implement mapping plan. Please approve the plan provided in the chat.");
        }

        function initTable() {
            updateTheme();
            const headerRow = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');

            // Build Header
            headerRow.innerHTML = columns.map(c => `<th>${c}</th>`).join('');

            renderData(rawData);
        }

        function updateTheme() {
            const savedTheme = localStorage.getItem('auditor_theme') || 'light';
            applyTheme(savedTheme);
        }

        function applyTheme(theme) {
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.removeAttribute('data-theme');
            
            // Force RGB variables for glassmorphism
            const surfaceStr = theme === 'dark' ? '31, 41, 55' : '255, 255, 255';
            document.documentElement.style.setProperty('--surface-rgb', surfaceStr);
        }

        // --- Handle Theme Changes from Parent ---
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'theme-change') {
                applyTheme(event.data.theme);
            }
        });

        function renderData(data) {
            const tbody = document.getElementById('tableBody');
            const noData = document.getElementById('noData');

            if (data.length === 0) {
                tbody.innerHTML = '';
                noData.style.display = 'block';
                document.getElementById('recordCount').innerText = '0 Records';
                return;
            }

            noData.style.display = 'none';
            tbody.innerHTML = data.map(row => {
                return `<tr>
                    ${columns.map(col => {
                    let val = row[col] || '-';
                    let css = '';

                    if (col === 'MRS') css = 'badge badge-mrs';
                    if (col === 'R/O No') {
                        css = 'badge badge-ro';
                        if (val.toUpperCase() === 'CANCLE' || val.toUpperCase() === 'CANCEL') {
                            css = 'badge badge-cancel';
                        }
                    }

                    return `<td><span class="${css}">${val}</span></td>`;
                }).join('')}
                </tr>`;
            }).join('');

            document.getElementById('recordCount').innerText = `${data.length} Records found`;
        }

        function filterTable() {
            const query = document.getElementById('tableSearch').value.toLowerCase();
            const filtered = rawData.filter(row => {
                return (row['MRS'] && row['MRS'].toString().toLowerCase().includes(query)) ||
                    (row['R/O No'] && row['R/O No'].toLowerCase().includes(query)) ||
                    (row['Claim No'] && row['Claim No'].toLowerCase().includes(query));
            });
            renderData(filtered);
        }

        // Handle JSON injection placeholder
        window.addEventListener('load', () => {
            // Wait a frame for better perceived performance
            setTimeout(initTable, 50);
        });

        function goBack() {
            try {
                window.parent.showScreen('screen-menu');
            } catch (e) {
                window.history.back();
            }
        }
    </script>
